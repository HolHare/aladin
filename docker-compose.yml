services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aladin
      POSTGRES_USER: aladin
      POSTGRES_PASSWORD: aladin_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aladin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
